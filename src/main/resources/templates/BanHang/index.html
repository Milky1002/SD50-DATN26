
<div th:fragment="content">
    <link rel="stylesheet" th:href="@{/css/banhang.css}">

    <div class="pos-container">
        <!-- ORDER TABS -->
        <div class="pos-tabs" id="orderTabs">
            <div class="pos-tab pos-tab--active" data-tab="0">
                <span>Đơn hàng 1</span>
                <button type="button" class="pos-tab__close" title="Đóng">&times;</button>
            </div>
            <button type="button" class="pos-tab pos-tab--add" id="btnAddTab" title="Thêm đơn hàng">+</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="pos-main">
            <!-- SEARCH BAR -->
            <div class="pos-search">
                <span class="pos-search__icon"><i class="bi bi-search"></i></span>
                <input type="text" id="productSearch" placeholder="Tìm kiếm hàng hóa (F3)" autocomplete="off"/>
                <button type="button" class="pos-search__scan" id="btnScanPos" title="Quét mã vạch"><i class="bi bi-upc-scan"></i></button>
            </div>

            <!-- LEFT: CART ITEMS / EMPTY STATE -->
            <div class="pos-body">
                <div class="pos-cart-area" id="cartArea">
                    <!-- Cart table header (hidden when empty) -->
                    <div class="pos-cart-table" id="cartTable" style="display:none">
                        <div class="pos-cart-thead">
                            <span class="pos-col pos-col--stt">STT</span>
                            <span class="pos-col pos-col--name">Tên hàng hóa</span>
                            <span class="pos-col pos-col--qty">Số lượng</span>
                            <span class="pos-col pos-col--price">Đơn giá</span>
                            <span class="pos-col pos-col--total">Thành tiền</span>
                            <span class="pos-col pos-col--action"></span>
                        </div>
                        <div class="pos-cart-tbody" id="cartItems"></div>
                    </div>

                    <!-- Empty state -->
                    <div class="pos-empty" id="cartEmpty">
                        <div class="pos-empty__icon">&#128722;</div>
                        <p>Ấn <strong>F3</strong> để tìm kiếm hàng hóa</p>
                    </div>

                    <!-- Product search results dropdown -->
                    <div class="pos-search-results" id="productList" style="display:none"></div>
                </div>

                <!-- RIGHT SIDEBAR -->
                <div class="pos-sidebar">
                    <!-- Customer -->
                    <div class="pos-sidebar__section">
                        <div class="pos-customer-row">
                            <input type="text" id="customerInput" placeholder="Tên khách hàng (F4)"/>
                            <button type="button" class="pos-icon-btn" id="btnAddCustomer" title="Thêm khách hàng mới">+</button>
                        </div>
                        <div id="customerSuggestions" class="pos-customer-suggestions" style="display:none"></div>
                        <div class="pos-customer-row" style="margin-top:6px;">
                            <input type="text" id="customerPhone" placeholder="Số điện thoại khách hàng"/>
                        </div>
                        <div class="pos-datetime" id="posDatetime"></div>
                    </div>

                    <!-- Totals -->
                    <div class="pos-sidebar__section">
                        <div class="pos-total-row">
                            <span>Tổng tiền</span>
                            <span class="pos-badge" id="itemCountBadge">0 hàng hóa</span>
                            <span class="pos-amount" id="totalAmount">0</span>
                        </div>
                    </div>

                    <!-- Promotion / Coupon -->
                    <div class="pos-sidebar__section">
                        <div class="pos-coupon-row">
                            <span class="pos-coupon-icon">&#127991;</span>
                            <input type="text" id="couponInput" placeholder="Nhập mã khuyến mại..." autocomplete="off"/>
                            <button type="button" class="pos-icon-btn" id="btnApplyPromo" title="Áp dụng">✓</button>
                        </div>
                        <div class="pos-promo-result" id="promoResult" style="display:none">
                            <div class="pos-promo-name" id="promoName"></div>
                            <div class="pos-promo-discount" id="promoDiscount"></div>
                            <button type="button" class="pos-promo-remove" id="btnRemovePromo" title="Bỏ khuyến mại">✕</button>
                        </div>
                        <input type="hidden" id="selectedPromotionId" value=""/>
                    </div>

                    <!-- Payment -->
                    <div class="pos-sidebar__section">
                        <div class="pos-payment-label">
                            <strong>Còn phải thu</strong>
                            <span class="pos-amount" id="amountDue">0</span>
                        </div>

                        <div class="pos-payment-methods" id="paymentMethods">
                            <label class="pos-radio">
                                <input type="radio" name="paymentMethod" value="cash" checked/>
                                <span>Tiền mặt</span>
                            </label>
                            <label class="pos-radio">
                                <input type="radio" name="paymentMethod" value="transfer"/>
                                <span>Chuyển khoản</span>
                            </label>
                            <label class="pos-radio">
                                <input type="radio" name="paymentMethod" value="card"/>
                                <span>Thẻ</span>
                            </label>
                            <label class="pos-radio">
                                <input type="radio" name="paymentMethod" value="ewallet"/>
                                <span>Ví</span>
                            </label>
                        </div>

                        <div class="pos-field-row">
                            <label>Tiền khách đưa</label>
                            <input type="number" id="cashGiven" value="0" min="0" step="1000"/>
                        </div>

                        <div class="pos-field-row">
                            <label>Tính vào công nợ</label>
                            <span class="pos-amount" id="debtAmount">0</span>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="pos-sidebar__section pos-options">
                        <a href="#" class="pos-link">Thông tin xuất hóa đơn &rarr;</a>
                        <label class="pos-checkbox">
                            <input type="checkbox" id="chkInvoice" checked/>
                            <span>Phát hành hóa đơn ngay</span>
                        </label>
                        <label class="pos-checkbox">
                            <input type="checkbox" id="chkPrint" checked/>
                            <span>In phiếu tính tiền (F10)</span>
                        </label>
                        <textarea id="orderNote" placeholder="Ghi chú..." rows="2"></textarea>
                    </div>

                    <!-- Checkout button -->
                    <div class="pos-sidebar__bottom">
                        <button type="button" class="pos-checkout-btn" id="btnCheckout" disabled>
                            Thanh toán (F9)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div class="bh-modal" id="addCustomerModal" aria-hidden="true">
        <div class="bh-modal__overlay" onclick="document.getElementById('addCustomerModal').classList.remove('is-open')"></div>
        <div class="bh-modal__dialog">
            <div class="bh-modal__header">
                <div class="bh-modal__title"><i class="bi bi-person-plus"></i> Thêm khách hàng mới</div>
                <button type="button" class="bh-modal__close" onclick="document.getElementById('addCustomerModal').classList.remove('is-open')">&times;</button>
            </div>
            <div class="bh-modal__body">
                <div class="pos-modal-field">
                    <label>Tên khách hàng <span style="color:#ef4444">*</span></label>
                    <input type="text" id="newCustName" placeholder="Nhập tên khách hàng"/>
                </div>
                <div class="pos-modal-field">
                    <label>Số điện thoại <span style="color:#ef4444">*</span></label>
                    <input type="text" id="newCustPhone" placeholder="Nhập số điện thoại"/>
                </div>
                <div class="pos-modal-field">
                    <label>Email</label>
                    <input type="email" id="newCustEmail" placeholder="Nhập email (không bắt buộc)"/>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:12px;">
                    <button type="button" class="pos-modal-btn pos-modal-btn--ghost" onclick="document.getElementById('addCustomerModal').classList.remove('is-open')">Hủy</button>
                    <button type="button" class="pos-modal-btn pos-modal-btn--primary" id="btnSaveCustomer">Lưu khách hàng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barcode scanner modal -->
    <div class="bh-modal" id="scanModalPos" aria-hidden="true">
        <div class="bh-modal__overlay" id="scanModalPosOverlay"></div>
        <div class="bh-modal__dialog">
            <div class="bh-modal__header">
                <div class="bh-modal__title">Quét mã vạch</div>
                <button type="button" class="bh-modal__close" id="btnCloseScanPos">&times;</button>
            </div>
            <div class="bh-modal__body" style="text-align:center">
                <div id="posScannerView" style="width:100%;max-width:400px;margin:0 auto"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        (function () {
            /* ========== MULTI-TAB ORDER MANAGEMENT ========== */
            var orders = [{ cart: [], customerName: '', customerPhone: '', note: '', cashGiven: 0 }];
            var activeOrderIdx = 0;
            var tabCounter = 1;

            var orderTabsEl = document.getElementById('orderTabs');
            var btnAddTab = document.getElementById('btnAddTab');

            function renderTabs() {
                var tabs = orderTabsEl.querySelectorAll('.pos-tab:not(.pos-tab--add)');
                tabs.forEach(function(t) { t.remove(); });

                orders.forEach(function(order, idx) {
                    var tab = document.createElement('div');
                    tab.className = 'pos-tab' + (idx === activeOrderIdx ? ' pos-tab--active' : '');
                    tab.setAttribute('data-tab', idx);
                    tab.innerHTML = '<span>Đơn hàng ' + (idx + 1) + '</span>'
                        + (orders.length > 1 ? '<button type="button" class="pos-tab__close" title="Đóng">&times;</button>' : '');
                    orderTabsEl.insertBefore(tab, btnAddTab);

                    tab.addEventListener('click', function(e) {
                        if (e.target.classList.contains('pos-tab__close')) {
                            e.stopPropagation();
                            closeTab(idx);
                            return;
                        }
                        switchTab(idx);
                    });
                });
            }

            function saveCurrentOrder() {
                orders[activeOrderIdx] = {
                    cart: cart.slice(),
                    customerName: document.getElementById('customerInput').value,
                    customerPhone: document.getElementById('customerPhone').value,
                    note: document.getElementById('orderNote').value,
                    cashGiven: parseInt(document.getElementById('cashGiven').value) || 0
                };
            }

            function loadOrder(idx) {
                var order = orders[idx];
                cart = order.cart.slice();
                document.getElementById('customerInput').value = order.customerName || '';
                document.getElementById('customerPhone').value = order.customerPhone || '';
                document.getElementById('orderNote').value = order.note || '';
                document.getElementById('cashGiven').value = order.cashGiven || 0;
                renderCart();
            }

            function switchTab(idx) {
                if (idx === activeOrderIdx) return;
                saveCurrentOrder();
                activeOrderIdx = idx;
                loadOrder(idx);
                renderTabs();
            }

            function closeTab(idx) {
                if (orders.length <= 1) return;
                orders.splice(idx, 1);
                if (activeOrderIdx >= orders.length) activeOrderIdx = orders.length - 1;
                else if (idx < activeOrderIdx) activeOrderIdx--;
                else if (idx === activeOrderIdx) activeOrderIdx = Math.min(idx, orders.length - 1);
                loadOrder(activeOrderIdx);
                renderTabs();
            }

            btnAddTab.addEventListener('click', function() {
                saveCurrentOrder();
                orders.push({ cart: [], customerName: '', customerPhone: '', note: '', cashGiven: 0 });
                tabCounter++;
                activeOrderIdx = orders.length - 1;
                loadOrder(activeOrderIdx);
                renderTabs();
            });

            /* ========== CORE VARIABLES ========== */
            var cart = [];
            var searchInput = document.getElementById('productSearch');
            var productList = document.getElementById('productList');
            var cartItems = document.getElementById('cartItems');
            var cartTable = document.getElementById('cartTable');
            var cartEmpty = document.getElementById('cartEmpty');
            var totalAmount = document.getElementById('totalAmount');
            var amountDue = document.getElementById('amountDue');
            var itemCountBadge = document.getElementById('itemCountBadge');
            var btnCheckout = document.getElementById('btnCheckout');
            var cashGiven = document.getElementById('cashGiven');
            var debtAmount = document.getElementById('debtAmount');
            var searchTimeout = null;

            /* ---------- DATE/TIME ---------- */
            function updateDateTime() {
                var now = new Date();
                var d = now.toLocaleDateString('vi-VN') + ' - ' + now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
                document.getElementById('posDatetime').textContent = d;
            }
            updateDateTime();
            setInterval(updateDateTime, 60000);

            /* ---------- FORMAT ---------- */
            function formatMoney(n) {
                return Number(n).toLocaleString('vi-VN');
            }

            /* ---------- SEARCH ---------- */
            function renderProducts(products) {
                if (!products.length) {
                    productList.innerHTML = '<div class="pos-search-empty">Không tìm thấy sản phẩm</div>';
                    productList.style.display = 'block';
                    return;
                }
                var html = '';
                products.forEach(function (p) {
                    html += '<div class="pos-search-item" data-id="' + p.id + '">'
                        + '<div class="pos-search-item__left">'
                        + '<strong>' + p.tenSanPham + '</strong>'
                        + '<span class="muted">' + p.maSanPham + (p.barcode ? ' | ' + p.barcode : '') + '</span>'
                        + '</div>'
                        + '<div class="pos-search-item__right">'
                        + '<span class="pos-price">' + formatMoney(p.giaBan) + '</span>'
                        + '<span class="muted">Tồn: ' + p.soLuongTon + '</span>'
                        + '</div>'
                        + '</div>';
                });
                productList.innerHTML = html;
                productList.style.display = 'block';
                productList.querySelectorAll('.pos-search-item').forEach(function (el) {
                    el.addEventListener('click', function () {
                        var id = parseInt(this.dataset.id);
                        var p = products.find(function (x) { return x.id === id; });
                        if (p) addToCart(p);
                        productList.style.display = 'none';
                        searchInput.value = '';
                    });
                });
            }

            function searchProducts(q) {
                fetch('/ban-hang/api/tim-san-pham?q=' + encodeURIComponent(q))
                    .then(function (r) { return r.json(); })
                    .then(function (data) { renderProducts(data); })
                    .catch(function () {
                        productList.innerHTML = '<div class="pos-search-empty">Lỗi khi tìm kiếm</div>';
                        productList.style.display = 'block';
                    });
            }

            searchInput.addEventListener('input', function () {
                clearTimeout(searchTimeout);
                var q = this.value.trim();
                if (!q) { productList.style.display = 'none'; return; }
                searchTimeout = setTimeout(function () { searchProducts(q); }, 300);
            });

            searchInput.addEventListener('focus', function () {
                if (this.value.trim()) searchProducts(this.value.trim());
            });

            document.addEventListener('click', function (e) {
                if (!productList.contains(e.target) && e.target !== searchInput) {
                    productList.style.display = 'none';
                }
            });

            /* ---------- CART ---------- */
            function addToCart(product) {
                var existing = cart.find(function (c) { return c.id === product.id; });
                if (existing) {
                    if (existing.soLuong >= product.soLuongTon) {
                        alert('Vượt quá số lượng tồn kho');
                        return;
                    }
                    existing.soLuong++;
                } else {
                    if (product.soLuongTon <= 0) {
                        alert('Sản phẩm hết hàng');
                        return;
                    }
                    cart.push({
                        id: product.id,
                        tenSanPham: product.tenSanPham,
                        maSanPham: product.maSanPham,
                        giaBan: product.giaBan,
                        soLuongTon: product.soLuongTon,
                        soLuong: 1
                    });
                }
                renderCart();
            }

            function renderCart() {
                if (!cart.length) {
                    cartTable.style.display = 'none';
                    cartEmpty.style.display = 'flex';
                    totalAmount.textContent = '0';
                    amountDue.textContent = '0';
                    itemCountBadge.textContent = '0 hàng hóa';
                    btnCheckout.disabled = true;
                    updateDebt();
                    return;
                }
                cartEmpty.style.display = 'none';
                cartTable.style.display = 'block';
                var html = '';
                var total = 0;
                var totalQty = 0;
                cart.forEach(function (item, idx) {
                    var lineTotal = item.giaBan * item.soLuong;
                    total += lineTotal;
                    totalQty += item.soLuong;
                    html += '<div class="pos-cart-row">'
                        + '<span class="pos-col pos-col--stt">' + (idx + 1) + '</span>'
                        + '<span class="pos-col pos-col--name">' + item.tenSanPham + '<br><span class="muted">' + item.maSanPham + '</span></span>'
                        + '<span class="pos-col pos-col--qty">'
                        + '<button type="button" class="pos-qty-btn" data-action="minus" data-idx="' + idx + '">−</button>'
                        + '<input type="number" class="pos-qty-input" value="' + item.soLuong + '" min="1" max="' + item.soLuongTon + '" data-idx="' + idx + '"/>'
                        + '<button type="button" class="pos-qty-btn" data-action="plus" data-idx="' + idx + '">+</button>'
                        + '</span>'
                        + '<span class="pos-col pos-col--price">' + formatMoney(item.giaBan) + '</span>'
                        + '<span class="pos-col pos-col--total">' + formatMoney(lineTotal) + '</span>'
                        + '<span class="pos-col pos-col--action"><button type="button" class="pos-remove-btn" data-idx="' + idx + '">&times;</button></span>'
                        + '</div>';
                });
                cartItems.innerHTML = html;
                totalAmount.textContent = formatMoney(total);
                amountDue.textContent = formatMoney(total);
                itemCountBadge.textContent = totalQty + ' hàng hóa';
                btnCheckout.disabled = false;
                updateDebt();

                // Event listeners
                cartItems.querySelectorAll('.pos-qty-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var idx = parseInt(this.dataset.idx);
                        if (this.dataset.action === 'minus') {
                            cart[idx].soLuong--;
                            if (cart[idx].soLuong <= 0) cart.splice(idx, 1);
                        } else {
                            if (cart[idx].soLuong >= cart[idx].soLuongTon) { alert('Vượt quá số lượng tồn kho'); return; }
                            cart[idx].soLuong++;
                        }
                        renderCart();
                    });
                });
                cartItems.querySelectorAll('.pos-qty-input').forEach(function (inp) {
                    inp.addEventListener('change', function () {
                        var idx = parseInt(this.dataset.idx);
                        var val = parseInt(this.value);
                        if (isNaN(val) || val < 1) val = 1;
                        if (val > cart[idx].soLuongTon) { val = cart[idx].soLuongTon; alert('Vượt quá số lượng tồn kho'); }
                        cart[idx].soLuong = val;
                        renderCart();
                    });
                });
                cartItems.querySelectorAll('.pos-remove-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        cart.splice(parseInt(this.dataset.idx), 1);
                        renderCart();
                    });
                });
            }

            /* ---------- PAYMENT CALC ---------- */
            function getTotal() {
                var total = 0;
                cart.forEach(function (item) { total += item.giaBan * item.soLuong; });
                return total;
            }

            function updateDebt() {
                var total = getTotal();
                var cash = parseInt(cashGiven.value) || 0;
                var debt = total - cash;
                debtAmount.textContent = debt > 0 ? formatMoney(debt) : '0';
            }

            cashGiven.addEventListener('input', updateDebt);

            /* ---------- CHECKOUT ---------- */
            btnCheckout.addEventListener('click', function () {
                if (!cart.length) return;
                var paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
                var promoId = document.getElementById('selectedPromotionId').value;
                var payload = {
                    tenKhachHang: document.getElementById('customerInput').value || 'Khách lẻ',
                    sdtKhachHang: document.getElementById('customerPhone').value || '',
                    ghiChu: document.getElementById('orderNote').value || '',
                    phuongThucThanhToan: paymentMethod,
                    tienKhachDua: parseInt(cashGiven.value) || 0,
                    promotionId: promoId ? parseInt(promoId) : null,
                    items: cart.map(function (c) {
                        return { sanPhamId: c.id, soLuong: c.soLuong };
                    })
                };
                btnCheckout.disabled = true;
                btnCheckout.textContent = 'Đang xử lý...';
                fetch('/ban-hang/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(function (r) {
                    return r.json().then(function(data) {
                        return { ok: r.ok, data: data };
                    });
                })
                .then(function (res) {
                    if (res.ok && res.data.success) {
                        alert('Thanh toán thành công!\nMã hóa đơn: ' + res.data.hoaDonId + '\nTổng tiền: ' + formatMoney(res.data.tongTien));
                        cart = [];
                        renderCart();
                        document.getElementById('customerInput').value = '';
                        document.getElementById('orderNote').value = '';
                        document.getElementById('customerPhone').value = '';
                        cashGiven.value = '0';
                        searchInput.value = '';
                        productList.style.display = 'none';
                        clearPromotion();
                        // Also save the cleared state
                        saveCurrentOrder();
                    } else {
                        alert('Lỗi thanh toán: ' + (res.data.message || 'Không xác định'));
                        btnCheckout.disabled = false;
                    }
                    btnCheckout.textContent = 'Thanh toán (F9)';
                })
                .catch(function (err) {
                    alert('Lỗi kết nối server: ' + err.message);
                    btnCheckout.disabled = false;
                    btnCheckout.textContent = 'Thanh toán (F9)';
                });
            });

            /* ---------- ADD CUSTOMER MODAL ---------- */
            var addCustModal = document.getElementById('addCustomerModal');
            document.getElementById('btnAddCustomer').addEventListener('click', function() {
                document.getElementById('newCustName').value = '';
                document.getElementById('newCustPhone').value = '';
                document.getElementById('newCustEmail').value = '';
                addCustModal.classList.add('is-open');
                setTimeout(function() { document.getElementById('newCustName').focus(); }, 100);
            });

            document.getElementById('btnSaveCustomer').addEventListener('click', function() {
                var name = document.getElementById('newCustName').value.trim();
                var phone = document.getElementById('newCustPhone').value.trim();
                if (!name) { alert('Vui lòng nhập tên khách hàng'); return; }
                if (!phone) { alert('Vui lòng nhập số điện thoại'); return; }

                // Fill the customer fields in the POS form
                document.getElementById('customerInput').value = name;
                document.getElementById('customerPhone').value = phone;
                addCustModal.classList.remove('is-open');
            });

            /* ---------- KEYBOARD SHORTCUTS ---------- */
            document.addEventListener('keydown', function (e) {
                if (e.key === 'F3') { e.preventDefault(); searchInput.focus(); }
                if (e.key === 'F4') { e.preventDefault(); document.getElementById('customerInput').focus(); }
                if (e.key === 'F9') { e.preventDefault(); btnCheckout.click(); }
                if (e.key === 'Escape') {
                    addCustModal.classList.remove('is-open');
                }
            });

            /* ---------- BARCODE SCANNER ---------- */
            var scanModal = document.getElementById('scanModalPos');
            var posScanner = null;
            document.getElementById('btnScanPos').addEventListener('click', function () {
                scanModal.classList.add('is-open');
                if (typeof Html5Qrcode !== 'undefined') {
                    posScanner = new Html5Qrcode('posScannerView');
                    posScanner.start(
                        { facingMode: 'environment' },
                        { fps: 10, qrbox: { width: 300, height: 100 } },
                        function (decoded) {
                            posScanner.stop().catch(function () {});
                            scanModal.classList.remove('is-open');
                            searchInput.value = decoded;
                            searchProducts(decoded);
                        },
                        function () {}
                    ).catch(function () {});
                }
            });
            function closeScanPos() {
                if (posScanner && posScanner.isScanning) posScanner.stop().catch(function () {});
                scanModal.classList.remove('is-open');
            }
            document.getElementById('btnCloseScanPos').addEventListener('click', closeScanPos);
            document.getElementById('scanModalPosOverlay').addEventListener('click', closeScanPos);

            /* ---------- PROMOTION / COUPON ---------- */
            var btnApplyPromo = document.getElementById('btnApplyPromo');
            var btnRemovePromo = document.getElementById('btnRemovePromo');
            var couponInput = document.getElementById('couponInput');
            var promoResult = document.getElementById('promoResult');
            var promoName = document.getElementById('promoName');
            var promoDiscount = document.getElementById('promoDiscount');
            var selectedPromotionId = document.getElementById('selectedPromotionId');

            if (btnApplyPromo) {
                btnApplyPromo.addEventListener('click', function() {
                    var code = couponInput.value.trim();
                    if (!code) { alert('Vui lòng nhập mã khuyến mại'); return; }
                    fetch('/api/chuong-trinh-khuyen-mai/code/' + encodeURIComponent(code))
                        .then(function(r) { return r.json(); })
                        .then(function(result) {
                            if (result.success && result.data) {
                                var promo = result.data;
                                if (promo.trangThai !== 1) {
                                    alert('Chương trình khuyến mại này đã ngừng hoạt động');
                                    return;
                                }
                                selectedPromotionId.value = promo.id;
                                promoName.textContent = promo.tenChuongTrinh;
                                // Calculate discount preview
                                var total = getCartTotal();
                                if (total > 0 && promo.loaiKhuyenMai === 1) {
                                    fetch('/api/chuong-trinh-khuyen-mai/' + promo.id + '/calculate-discount?orderTotal=' + total)
                                        .then(function(r) { return r.json(); })
                                        .then(function(res) {
                                            if (res.success) {
                                                promoDiscount.textContent = '-' + formatMoney(res.data);
                                            } else {
                                                promoDiscount.textContent = res.message;
                                            }
                                        });
                                } else {
                                    promoDiscount.textContent = promo.loaiGiam === 1
                                        ? 'Giảm ' + promo.giaTriGiam + '%'
                                        : 'Giảm ' + formatMoney(promo.giaTriGiam);
                                }
                                promoResult.style.display = 'flex';
                                couponInput.style.display = 'none';
                                btnApplyPromo.style.display = 'none';
                            } else {
                                alert('Không tìm thấy mã khuyến mại: ' + code);
                            }
                        })
                        .catch(function(err) {
                            alert('Lỗi tìm mã: ' + err.message);
                        });
                });
            }

            if (btnRemovePromo) {
                btnRemovePromo.addEventListener('click', function() {
                    clearPromotion();
                });
            }

            // Enter key on coupon input
            if (couponInput) {
                couponInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (btnApplyPromo) btnApplyPromo.click();
                    }
                });
            }

            function clearPromotion() {
                selectedPromotionId.value = '';
                promoResult.style.display = 'none';
                couponInput.style.display = '';
                couponInput.value = '';
                if (btnApplyPromo) btnApplyPromo.style.display = '';
            }

            function getCartTotal() {
                var total = 0;
                cart.forEach(function(c) { total += c.giaBan * c.soLuong; });
                return total;
            }

            /* ---------- INIT ---------- */
            renderCart();
            renderTabs();
        })();
    </script>
</div>
