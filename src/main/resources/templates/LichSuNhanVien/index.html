<div th:fragment="content">
    <style>
        .lsnv-wrap { padding: 0 4px; }
        .lsnv-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .lsnv-search {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 0 12px;
            gap: 6px;
            flex: 1;
            min-width: 220px;
        }
        .lsnv-search input {
            border: none;
            outline: none;
            padding: 8px 0;
            font-size: 14px;
            width: 100%;
            background: transparent;
        }
        .lsnv-card {
            background: #fff;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            overflow: hidden;
        }
        .lsnv-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .lsnv-table thead th {
            background: #f8fafc;
            padding: 11px 14px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 1.5px solid #e2e8f0;
            white-space: nowrap;
        }
        .lsnv-table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background .12s;
        }
        .lsnv-table tbody tr:last-child { border-bottom: none; }
        .lsnv-table tbody tr:hover { background: #f8fafc; }
        .lsnv-table td {
            padding: 10px 14px;
            color: #334155;
            vertical-align: middle;
        }
        .badge-action {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-sale   { background: #dcfce7; color: #15803d; }
        .badge-kh-tao { background: #dbeafe; color: #1d4ed8; }
        .badge-kh-sua { background: #fef9c3; color: #854d0e; }
        .badge-other  { background: #f1f5f9; color: #475569; }
        .lsnv-empty {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
            font-size: 15px;
        }
        .lsnv-empty i { font-size: 36px; display: block; margin-bottom: 10px; }
        .lsnv-val { font-weight: 600; color: #0f766e; }
    </style>

    <div class="lsnv-wrap">
        <!-- Toolbar / filter -->
        <form class="lsnv-toolbar" th:action="@{/lich-su-nhan-vien}" method="get">
            <div class="lsnv-search">
                <i class="bi bi-search" style="color:#94a3b8"></i>
                <input name="nhanVienId" type="number" min="1"
                       placeholder="Lọc theo Nhân viên ID…"
                       th:value="${filterNhanVienId}"/>
            </div>
            <button type="submit"
                    style="padding:9px 18px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">
                <i class="bi bi-funnel"></i> Lọc
            </button>
            <a th:href="@{/lich-su-nhan-vien}"
               style="padding:9px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;cursor:pointer;font-size:14px;text-decoration:none;font-weight:600;">
                <i class="bi bi-x-lg"></i> Xóa lọc
            </a>
        </form>

        <!-- Table -->
        <div class="lsnv-card">
            <table class="lsnv-table">
                <thead>
                <tr>
                    <th style="width:60px">#</th>
                    <th style="width:160px">Nhân viên</th>
                    <th style="width:140px">Hành động</th>
                    <th style="width:120px">Đối tượng</th>
                    <th style="width:90px">ID</th>
                    <th>Mô tả</th>
                    <th style="width:130px;text-align:right">Giá trị</th>
                    <th style="width:155px">Thời gian</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="8">
                        <div class="lsnv-empty">
                            <i class="bi bi-clock-history"></i>
                            Chưa có bản ghi hoạt động nào.
                        </div>
                    </td>
                </tr>
                <tr th:each="item, stat : ${list}">
                    <td th:text="${stat.index + 1}">1</td>
                    <td>
                        <span th:text="${item.hoTenNhanVien} ?: ('NV#' + item.nhanVienId)">Nhân viên</span>
                    </td>
                    <td>
                        <span class="badge-action"
                              th:classappend="${item.hanhDong == 'SALE_OFFLINE'} ? 'badge-sale' : (${item.hanhDong == 'KH_TAO'} ? 'badge-kh-tao' : (${item.hanhDong == 'KH_SUA'} ? 'badge-kh-sua' : 'badge-other'))"
                              th:text="${item.hanhDong == 'SALE_OFFLINE'} ? 'Bán tại quầy' : (${item.hanhDong == 'KH_TAO'} ? 'Tạo KH' : (${item.hanhDong == 'KH_SUA'} ? 'Sửa KH' : item.hanhDong))">
                            Hành động
                        </span>
                    </td>
                    <td th:text="${item.doiTuong} ?: '—'">—</td>
                    <td th:text="${item.doiTuongId} ?: '—'">—</td>
                    <td th:text="${item.moTa} ?: '—'">—</td>
                    <td style="text-align:right">
                        <span class="lsnv-val" th:if="${item.giaTri != null}"
                              th:text="${#numbers.formatDecimal(item.giaTri, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</span>
                        <span th:unless="${item.giaTri != null}">—</span>
                    </td>
                    <td th:text="${#temporals.format(item.thoiGian, 'dd/MM/yyyy HH:mm')}">—</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top:10px;color:#94a3b8;font-size:13px"
             th:text="'Tổng: ' + ${#lists.size(list)} + ' bản ghi'">
        </div>
    </div>
</div>
