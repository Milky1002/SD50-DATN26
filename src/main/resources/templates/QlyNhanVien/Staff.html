<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên | SD50</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

<div class="max-w-6xl mx-auto">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Quản lý nhân viên</h1>
            <p class="text-slate-500 font-medium">Quản lý danh sách nhân viên và quyền truy cập</p>
        </div>

        <div class="flex items-center gap-3"> 
            <button type="button" onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-2 py-2 rounded-xl font-bold flex items-center justify-center transition-all shadow-lg shadow-emerald-100">
                <img src="../../static/img/sheets.png" alt="xuất excel" class="w-5 h-5 object-contain">
            </button>

            <button onclick="openAddModal()" class="bg-indigo-500 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-2xl flex items-center gap-2 shadow-xl shadow-indigo-200 transition-all active:scale-95">
                <i class="fa-solid fa-user-plus"></i>
                <span class="font-bold text-sm">Thêm nhân viên mới</span>
            </button>
        </div>
    </div>

    <div class="bg-white p-2 rounded-[2rem] shadow-sm border border-slate-200 mb-6">
        <form th:action="@{/nhan-vien}" method="get" class="flex flex-col md:flex-row gap-4">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Tìm theo tên hoặc số điện thoại..."
                       class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-slate-600">
            </div>

            <div class="col-md-3">
            <select name="status" class="form-select form-select-lg shadow-sm mb-3" 
                    style="border-radius: 12px; border: none; background-color: #f8fafc;">
                <option value="">Tất cả trạng thái</option>
                <option value="1" th:selected="${status == 1}">Đang làm</option>
                <option value="0" th:selected="${status == 0}">Nghỉ việc</option>
            </select>
        </div>

            <div class="flex gap-2">
                <button type="submit" class="bg-slate-800 hover:bg-black text-white px-6 py-3 rounded-xl font-bold transition-all">
                    Lọc kết quả
                </button>
                <a th:href="@{/nhan-vien}" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 py-3 rounded-xl flex items-center justify-center transition-all">
                    <i class="fa-solid fa-rotate-right"></i>
                </a>
            </div>
        </form>
    </div>
    
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-100">
            <tr>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Nhân viên</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Liên hệ</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Trạng thái</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest text-center">Hành động</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
            <tr th:each="nv : ${listNhanVien}" class="hover:bg-slate-50/80 transition-colors group">
                <td class="px-6 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold" th:text="${#strings.substring(nv.hoTen,0,1)}"></div>
                        <div>
                            <div class="font-bold text-slate-700 group-hover:text-indigo-600 transition-colors" th:text="${nv.hoTen}"></div>
                            <div class="text-xs font-bold text-slate-400" th:text="${nv.tenChucVu}"></div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-5">
                    <div class="text-sm text-slate-600 font-medium" th:text="${nv.email}"></div>
                    <div class="text-xs text-slate-400" th:text="${nv.sdt}"></div>
                </td>
                <td class="px-6 py-5">
                    <a th:href="@{/nhan-vien/toggle/{id}(id=${nv.id})}" class="inline-flex">
                                <span th:if="${nv.trangThai == 1}" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[11px] font-black uppercase tracking-tighter flex items-center gap-1.5 border border-emerald-100">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Đang làm
                                </span>
                        <span th:unless="${nv.trangThai == 1}" class="bg-rose-50 text-rose-600 px-3 py-1 rounded-full text-[11px] font-black uppercase tracking-tighter flex items-center gap-1.5 border border-rose-100">
                                    <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span> Nghỉ việc
                                </span>
                    </a>
                </td>
                <td class="px-6 py-5 text-center">
                    <button th:onclick="'openEditModal(' + ${nv.id} + ')'" class="w-9 h-9 rounded-xl text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="staffModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl transform transition-all scale-95 opacity-0 duration-300" id="modalContainer">
        <div class="px-10 py-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
            <h2 id="modalTitle" class="text-2xl font-black text-slate-800">Cập nhật nhân sự</h2>
            <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white text-slate-400 hover:text-rose-500 transition-all text-2xl">&times;</button>
        </div>

        <form th:action="@{/nhan-vien/save}" method="post" class="p-10">
            <input type="hidden" name="id" id="f_id">
            <input type="hidden" name="trangThai" id="f_trangThai"> <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Họ tên nhân viên *</label>
                <input type="text" name="hoTen" id="f_hoTen" required class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 transition-all outline-none font-bold text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Email liên hệ</label>
                <input type="email" name="email" id="f_email" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Số điện thoại</label>
                <input type="text" name="sdt" id="f_sdt" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Giới tính</label>
                <select name="gioiTinh" id="f_gioiTinh" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 transition-all outline-none font-bold text-slate-700">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Ngày sinh</label>
                <input type="date" name="ngaySinh" id="f_ngaySinh" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Chức vụ *</label>
                <select name="chucVuId" id="f_chucVu" required class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-600">
                    <option th:each="pos : ${listPositions}" th:value="${pos.id}" th:text="${pos.tenChucVu}"></option>
                </select>
            </div>

            <div id="acc_box" class="md:col-span-2 p-6 bg-indigo-50 rounded-3xl border border-indigo-100">
                <label class="block text-xs font-black text-indigo-400 uppercase mb-2 tracking-widest">Cấp tài khoản hệ thống (Tùy chọn)</label>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-indigo-300"></i>
                        <input type="text" name="username" placeholder="Tên đăng nhập..." class="w-full bg-white border-none rounded-xl pl-10 pr-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                </div>
                <p class="text-[10px] text-indigo-400 mt-2 font-bold italic">* Mật khẩu mặc định sẽ là 123456</p>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Địa chỉ cư trú</label>
                <textarea name="diaChi" id="f_diaChi" rows="2" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3.5 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
            </div>
        </div>

            <div class="mt-10 flex gap-4">
                <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 rounded-2xl font-black text-slate-400 hover:bg-slate-100 transition-all uppercase tracking-widest text-xs">Hủy bỏ</button>
                <button type="submit" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-indigo-100 transition-all active:scale-95">Xác nhận lưu</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('staffModal');
    const container = document.getElementById('modalContainer');

    function openAddModal() {
        document.getElementById('modalTitle').innerText = "Thêm nhân viên";
        document.querySelector('form').reset();
        document.getElementById('f_id').value = "";
        document.getElementById('f_trangThai').value = 1; // Mặc định
        document.getElementById('acc_box').style.display = 'block';

        showModal();
    }

    function openEditModal(id) {
        fetch('/nhan-vien/edit/' + id)
            .then(res => res.json())
            .then(data => {
                document.getElementById('modalTitle').innerText = "Sửa: " + data.hoTen;
                document.getElementById('f_id').value = data.id;
                document.getElementById('f_hoTen').value = data.hoTen;
                document.getElementById('f_email').value = data.email;
                document.getElementById('f_sdt').value = data.sdt;
                document.getElementById('f_ngaySinh').value = data.ngaySinh;
                document.getElementById('f_gioiTinh').value = data.gioiTinh;
                document.getElementById('f_chucVu').value = data.chucVuId;
                document.getElementById('f_diaChi').value = data.diaChi;
                document.getElementById('f_trangThai').value = data.trangThai; // Gán lại trạng thái cũ để không bị null

                document.getElementById('acc_box').style.display = 'none'; // Ẩn phần tạo tài khoản khi sửa
                showModal();
            });
    }

    function showModal() {
        modal.classList.remove('hidden');
        setTimeout(() => {
            container.classList.remove('scale-95', 'opacity-0');
            container.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeModal() {
        container.classList.remove('scale-100', 'opacity-100');
        container.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }
    // xuất excel
    function exportToExcel() {
        // Lấy giá trị keyword và status hiện tại từ form tìm kiếm
        const keyword = document.getElementsByName('keyword')[0].value;
        const status = document.getElementsByName('status')[0].value;

        // Chuyển hướng trình duyệt đến endpoint export kèm tham số
        window.location.href = `/nhan-vien/export?keyword=${keyword}&status=${status}`;
    }
</script>
</body>
</html>
