<div th:fragment="content">
    <link rel="stylesheet" th:href="@{/css/nhanvien.css}">

    <div class="nv-wrap">
        <!-- TOOLBAR -->
        <div class="nv-toolbar">
            <form class="nv-search" th:action="@{/nhan-vien}" method="get">
                <span class="nv-search__icon"><i class="bi bi-search"></i></span>
                <input name="keyword" th:value="${keyword}" placeholder="Tìm theo tên hoặc số điện thoại..."/>
                <select name="status" class="nv-select">
                    <option value="">Tất cả trạng thái</option>
                    <option value="1" th:selected="${status == 1}">Đang làm</option>
                    <option value="0" th:selected="${status == 0}">Nghỉ việc</option>
                </select>
                <button type="submit" class="nv-btn nv-btn--search"><i class="bi bi-funnel"></i> Lọc</button>
                <a th:href="@{/nhan-vien}" class="nv-btn nv-btn--ghost"><i class="bi bi-arrow-clockwise"></i></a>
            </form>

            <div class="nv-actions">
                <button type="button" onclick="exportToExcel()" class="nv-btn nv-btn--success" title="Xuất Excel">
                    <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                </button>
                <button type="button" onclick="openAddModal()" class="nv-btn nv-btn--primary">
                    <i class="bi bi-person-plus-fill"></i> Thêm nhân viên
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="nv-card nv-tablewrap">
            <table class="nv-table">
                <thead>
                <tr>
                    <th style="width:60px">STT</th>
                    <th>Nhân viên</th>
                    <th style="width:200px">Liên hệ</th>
                    <th style="width:120px">Giới tính</th>
                    <th style="width:140px">Chức vụ</th>
                    <th style="width:140px">Trạng thái</th>
                    <th style="width:120px;text-align:center">Chức năng</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="nv, stat : ${listNhanVien}">
                    <td class="nv-stt" th:text="${stat.index + 1}"></td>
                    <td>
                        <div class="nv-user">
                            <div class="nv-avatar"
                                 th:text="${nv.hoTen != null and !#strings.isEmpty(nv.hoTen)} ? ${#strings.substring(nv.hoTen,0,1)} : '?'"></div>
                            <div class="nv-user__info">
                                <div class="nv-user__name" th:text="${nv.hoTen}"></div>
                                <div class="nv-user__sub" th:text="${nv.email}"></div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="nv-contact">
                            <span th:if="${nv.sdt != null}"><i class="bi bi-telephone"></i> <span th:text="${nv.sdt}"></span></span>
                            <span th:if="${nv.email != null}" class="nv-contact__email"><i class="bi bi-envelope"></i> <span th:text="${nv.email}"></span></span>
                        </div>
                    </td>
                    <td th:text="${nv.gioiTinh ?: '--'}"></td>
                    <td>
                        <span class="nv-role" th:text="${nv.tenChucVu}"></span>
                    </td>
                    <td>
                        <a th:href="@{/nhan-vien/toggle/{id}(id=${nv.id})}" class="nv-status-link">
                            <span th:if="${nv.trangThai == 1}" class="pill pill--ok">
                                <i class="bi bi-circle-fill nv-dot"></i> Đang làm
                            </span>
                            <span th:unless="${nv.trangThai == 1}" class="pill pill--off">
                                <i class="bi bi-circle-fill nv-dot"></i> Nghỉ việc
                            </span>
                        </a>
                    </td>
                    <td style="text-align:center">
                        <button type="button" class="nv-action nv-action--edit" th:onclick="'openEditModal(' + ${nv.id} + ')'">
                            <i class="bi bi-pencil-square"></i> Sửa
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listNhanVien)}">
                    <td colspan="7" class="empty">Không có dữ liệu nhân viên</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL ADD/EDIT -->
    <div class="nv-modal" id="staffModal" aria-hidden="true">
        <div class="nv-modal__overlay" id="staffModalOverlay"></div>
        <div class="nv-modal__dialog">
            <div class="nv-modal__header">
                <div class="nv-modal__title" id="modalTitle">Thêm nhân viên</div>
                <button type="button" class="nv-modal__close" id="btnCloseModal">&times;</button>
            </div>
            <form id="staffForm" th:action="@{/nhan-vien/save}" method="post">
                <input type="hidden" name="id" id="f_id"/>
                <input type="hidden" name="trangThai" id="f_trangThai" value="1"/>
                <div class="nv-modal__body">
                    <div class="nv-form-grid">
                        <div class="nv-field nv-field--full">
                            <label>Họ tên nhân viên <span class="req">*</span></label>
                            <input type="text" name="hoTen" id="f_hoTen" placeholder="Nhập họ tên nhân viên" required/>
                        </div>
                        <div class="nv-field">
                            <label>Email liên hệ</label>
                            <input type="email" name="email" id="f_email" placeholder="email@example.com"/>
                        </div>
                        <div class="nv-field">
                            <label>Số điện thoại</label>
                            <input type="text" name="sdt" id="f_sdt" placeholder="0123456789"/>
                        </div>
                        <div class="nv-field">
                            <label>Giới tính</label>
                            <select name="gioiTinh" id="f_gioiTinh">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="nv-field">
                            <label>Ngày sinh</label>
                            <input type="date" name="ngaySinh" id="f_ngaySinh"/>
                        </div>
                        <div class="nv-field">
                            <label>Chức vụ <span class="req">*</span></label>
                            <select name="chucVuId" id="f_chucVu" required>
                                <option th:each="pos : ${listPositions}" th:value="${pos.id}" th:text="${pos.tenChucVu}"></option>
                            </select>
                        </div>

                        <!-- Account section -->
                        <div class="nv-field nv-field--full nv-account-box" id="acc_box">
                            <label><i class="bi bi-shield-lock"></i> Tài khoản hệ thống (tùy chọn)</label>
                            <input type="text" name="username" id="f_username" placeholder="Tên đăng nhập..."/>
                            <span class="nv-hint">* Mật khẩu mặc định sẽ là 123456</span>
                        </div>

                        <div class="nv-field nv-field--full">
                            <label>Địa chỉ cư trú</label>
                            <textarea name="diaChi" id="f_diaChi" rows="2" placeholder="Nhập địa chỉ"></textarea>
                        </div>
                    </div>
                </div>
                <div class="nv-modal__footer">
                    <button type="button" class="nv-btn nv-btn--ghost" id="btnCancelModal">Hủy</button>
                    <button type="submit" class="nv-btn nv-btn--primary"><i class="bi bi-check-lg"></i> Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        var modal = document.getElementById('staffModal');
        var overlay = document.getElementById('staffModalOverlay');
        var btnClose = document.getElementById('btnCloseModal');
        var btnCancel = document.getElementById('btnCancelModal');
        var staffForm = document.getElementById('staffForm');

        function openModal() {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
        }
        function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
        }

        window.openAddModal = function() {
            document.getElementById('modalTitle').textContent = 'Thêm nhân viên';
            staffForm.reset();
            document.getElementById('f_id').value = '';
            document.getElementById('f_trangThai').value = 1;
            document.getElementById('f_username').value = '';
            document.getElementById('acc_box').style.display = '';
            openModal();
        };

        window.openEditModal = function(id) {
            fetch('/nhan-vien/edit/' + id)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('modalTitle').textContent = 'Sửa nhân viên: ' + data.hoTen;
                    document.getElementById('f_id').value = data.id;
                    document.getElementById('f_hoTen').value = data.hoTen || '';
                    document.getElementById('f_email').value = data.email || '';
                    document.getElementById('f_sdt').value = data.sdt || '';
                    document.getElementById('f_ngaySinh').value = data.ngaySinh || '';
                    document.getElementById('f_gioiTinh').value = data.gioiTinh || 'Nam';
                    document.getElementById('f_chucVu').value = data.chucVuId || '';
                    document.getElementById('f_diaChi').value = data.diaChi || '';
                    document.getElementById('f_trangThai').value = data.trangThai;
                    document.getElementById('acc_box').style.display = 'none';
                    openModal();
                });
        };

        btnClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);
        overlay.addEventListener('click', closeModal);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        window.exportToExcel = function() {
            var keyword = document.getElementsByName('keyword')[0];
            var status = document.getElementsByName('status')[0];
            var kw = keyword ? keyword.value : '';
            var st = status ? status.value : '';
            window.location.href = '/nhan-vien/export?keyword=' + encodeURIComponent(kw) + '&status=' + encodeURIComponent(st);
        };
    </script>
</div>
