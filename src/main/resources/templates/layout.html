<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${pageTitle} ?: 'Admin'">Admin</title>

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Base admin styles -->
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <!-- Page-specific CSS (set by controller via model.addAttribute("pageCss", ...)) -->
    <link rel="stylesheet" th:if="${pageCss}" th:href="@{${pageCss}}" />
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar__top">
            <div class="brand">
                <div class="brand__logo"><i class="bi bi-shop"></i></div>
                <div class="brand__name">Yonex Admin</div>
            </div>

            <button id="toggleSidebar" class="icon-btn sidebar-toggle" type="button" aria-label="Thu gọn / Mở sidebar">
                <i class="bi bi-chevron-left"></i>
            </button>
        </div>

        <nav class="nav">
            <a class="nav__item"
               th:href="@{/dashboard}"
               th:classappend="${activeMenu == 'dashboard'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-grid-1x2-fill"></i></span>
                <span class="nav__text">Tổng quan</span>
            </a>

            <a class="nav__item"
               th:href="@{/nhan-vien}"
               th:classappend="${activeMenu == 'nhanvien'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-people-fill"></i></span>
                <span class="nav__text">Quản lý nhân viên</span>
            </a>

            <a class="nav__item"
               th:href="@{/khachhang/hienthi}"
               th:classappend="${activeMenu == 'khachhang'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-person-lines-fill"></i></span>
                <span class="nav__text">Quản lý khách hàng</span>
            </a>

            <a class="nav__item"
               th:href="@{/invoices}"
               th:classappend="${activeMenu == 'hoadon'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-receipt-cutoff"></i></span>
                <span class="nav__text">Quản lý hóa đơn</span>
            </a>
            <a class="nav__item"
               th:href="@{/orders}"
               th:classappend="${activeMenu == 'donhang'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-bag-check-fill"></i></span>
                <span class="nav__text">Quản lý đơn hàng</span>
            </a>
            <a class="nav__item"
               th:href="@{/khuyen-mai}"
               th:classappend="${activeMenu == 'khuyenmai'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-gift-fill"></i></span>
                <span class="nav__text">Chương trình khuyến mãi</span>
            </a>

            <div class="nav__section-title">
                <span class="nav__text">SẢN PHẨM</span>
            </div>

            <a class="nav__item"
               th:href="@{/san-pham}"
               th:classappend="${activeMenu == 'sanpham'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-box-seam-fill"></i></span>
                <span class="nav__text">Sản phẩm</span>
            </a>
            <a class="nav__item"
               th:href="@{/danh-muc}"
               th:classappend="${activeMenu == 'danhmuc'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-tags-fill"></i></span>
                <span class="nav__text">Danh mục sản phẩm</span>
            </a>
            <a class="nav__item"
               th:href="@{/mau-sac}"
               th:classappend="${activeMenu == 'mausac'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-palette-fill"></i></span>
                <span class="nav__text">Màu sắc</span>
            </a>

            <div class="nav__section-title">
                <span class="nav__text">KÊNH BÁN HÀNG</span>
            </div>

            <a class="nav__item"
               th:href="@{/ban-hang}"
               th:classappend="${activeMenu == 'banhang'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-cart3"></i></span>
                <span class="nav__text">Bán tại cửa hàng</span>
            </a>

            <div class="nav__section-title">
                <span class="nav__text">KHO HÀNG</span>
            </div>

            <a class="nav__item"
               th:href="@{/xuat-kho}"
               th:classappend="${activeMenu == 'xuatkho'} ? ' active'">
                <span class="nav__icon"><i class="bi bi-box-arrow-up-right"></i></span>
                <span class="nav__text">Xuất kho</span>
            </a>
        </nav>

        <div class="sidebar__bottom">
            <a class="nav__item" href="#">
                <span class="nav__icon"><i class="bi bi-gear-fill"></i></span>
                <span class="nav__text">Thiết lập</span>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <header class="topbar">
            <div class="topbar__title" th:text="${pageHeading} ?: 'Bàn làm việc'">Bàn làm việc</div>
            <div class="topbar__right">
                <a th:href="@{/ban-hang}" class="pill"><i class="bi bi-cart3"></i> Bán hàng</a>
                <button class="icon-btn topbar-icon" type="button" aria-label="Thông báo">
                    <i class="bi bi-bell-fill"></i>
                </button>
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
            </div>
        </header>

        <section class="content">
            <div th:replace="~{${content} :: content}"></div>
        </section>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
