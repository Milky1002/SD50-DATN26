<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Đăng nhập - Yonex Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="bi bi-shop"></i>
            </div>
            <h1 class="login-title">Yonex Admin</h1>
            <p class="login-subtitle">Đăng nhập để quản lý hệ thống</p>
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <!-- Error message -->
            <div class="login-error" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}">Lỗi đăng nhập</span>
            </div>

            <div class="login-field">
                <label for="username">
                    <i class="bi bi-person"></i> Tên đăng nhập
                </label>
                <input type="text" id="username" name="username"
                       th:value="${username}"
                       placeholder="Nhập tên đăng nhập..."
                       required autofocus autocomplete="username"/>
            </div>

            <div class="login-field">
                <label for="password">
                    <i class="bi bi-lock"></i> Mật khẩu
                </label>
                <div class="login-password-wrap">
                    <input type="password" id="password" name="password"
                           placeholder="Nhập mật khẩu..."
                           required autocomplete="current-password"/>
                    <button type="button" class="login-toggle-pwd" onclick="togglePassword()" title="Hiện/ẩn mật khẩu">
                        <i class="bi bi-eye" id="pwdIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
            </button>
        </form>

        <div class="login-footer">
            <p>&copy; 2026 Yonex Admin System</p>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        var input = document.getElementById('password');
        var icon = document.getElementById('pwdIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    // Auto-focus on first empty field
    document.addEventListener('DOMContentLoaded', function() {
        var username = document.getElementById('username');
        var password = document.getElementById('password');
        if (username.value) {
            password.focus();
        } else {
            username.focus();
        }
    });
</script>
</body>
</html>
