<div th:fragment="content">
    <link rel="stylesheet" th:href="@{/css/order-management.css}"/>

    <div class="card order-card">
        <div class="order-card__header">
            <div>
                <h2>Danh sách đơn hàng</h2>
                <p class="order-card__subtitle">Quản lý, theo dõi và xử lý các đơn hàng của cửa hàng</p>
            </div>
            <div class="order-card__header-actions">
                <button id="btnExport" class="btn btn--secondary" type="button">Xuất file</button>
                <button id="btnCreateOrder" class="btn btn--primary" type="button">Tạo đơn hàng</button>
            </div>
        </div>

        <div class="order-tabs">
            <button class="order-tabs__item is-active" type="button" data-order-tab="all">Tất cả đơn hàng</button>
            <button class="order-tabs__item" type="button" data-order-tab="waiting">Chờ xác nhận</button>
            <button class="order-tabs__item" type="button" data-order-tab="shipping">Đang giao hàng</button>
            <button class="order-tabs__item" type="button" data-order-tab="done">Hoàn tất</button>
            <button class="order-tabs__item" type="button" data-order-tab="cancelled">Đã hủy</button>
        </div>

        <div class="order-table-wrapper">
            <table class="order-table">
                <thead>
                <tr>
                    <th>Mã đơn hàng</th>
                    <th>Khách hàng</th>
                    <th>Ngày đặt</th>
                    <th>Sản phẩm</th>
                    <th class="order-table__col-right">Tổng tiền</th>
                    <th>Thanh toán</th>
                    <th>Vận chuyển</th>
                    <th class="order-table__col-center">Thao tác</th>
                </tr>
                </thead>
                <tbody id="orderTableBody">
                <tr th:each="order : ${orders}" th:attr="data-status=${order.tabKey}">
                    <td class="order-code">
                        <a href="#" class="order-code__link" th:text="${order.code}">#DH00000</a>
                    </td>
                    <td>
                        <div class="order-row__customer">
                            <div class="order-row__avatar" th:text="${order.initials}">NA</div>
                            <div>
                                <div class="order-row__name" th:text="${order.customerName}">Tên khách hàng</div>
                                <div class="order-row__sub" th:text="${order.customerPhone}">SĐT</div>
                            </div>
                        </div>
                    </td>
                    <td th:attr="data-date=${order.createdAt}">
                        <div class="order-row__date"
                             th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">
                            01/01/2026 00:00
                        </div>
                    </td>
                    <td>
                        <div class="order-row__product">
                            <div class="order-row__product-img"></div>
                            <div class="order-row__product-meta">
                                <div class="order-row__product-name" th:text="${order.productName}">Tên sản phẩm</div>
                                <div class="order-row__sub">
                                    Số lượng: <span th:text="${order.quantity}">1</span>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="order-table__col-right"
                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '₫'">
                        0₫
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.displayPaymentStatus == 'Đã thanh toán'} ? ' badge--paid' :
                                              (order.displayPaymentStatus == 'Chờ thanh toán' ? ' badge--waiting-payment' :
                                               ' badge--partial')"
                              th:text="${order.displayPaymentStatus}">
                            Đã thanh toán
                        </span>
                    </td>
                    <td>
                        <form th:action="@{'/orders/' + ${order.id} + '/status'}" method="post">
                            <select name="status" class="status-select" onchange="this.form.submit()">
                                <option th:value="0" th:selected="${order.orderStatus == 0}">Chờ xử lý</option>
                                <option th:value="1" th:selected="${order.orderStatus == 1}">Đang giao</option>
                                <option th:value="2" th:selected="${order.orderStatus == 2}">Hoàn tất</option>
                                <option th:value="3" th:selected="${order.orderStatus == 3}">Đã hủy</option>
                            </select>
                        </form>
                    </td>
                    <td class="order-table__col-center">
                        <form th:action="@{'/orders/' + ${order.id} + '/delete'}"
                              method="post"
                              onsubmit="return confirm('Bạn có chắc muốn xóa đơn hàng này?');">
                            <button class="icon-btn icon-btn--ghost" type="submit">🗑</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="order-footer">
            <div class="pagination">
                <button class="pagination__item" type="button">&lt;</button>
                <button class="pagination__item is-active" type="button">1</button>
                <button class="pagination__item" type="button">2</button>
                <button class="pagination__item" type="button">3</button>
                <button class="pagination__item" type="button">&gt;</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/order-management.js}"></script>
</div>
