<!DOCTYPE html>
<html lang="vi" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Phieu tinh tien</title>
    <style type="text/css">
        @page {
            size: 80mm auto;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 11px;
            width: 302px;
            color: #000;
        }
        .wrapper {
            width: 280px;
            margin: 0 auto;
            padding: 10px 0;
        }
        .center {
            text-align: center;
        }
        .bold {
            font-weight: bold;
        }
        .small {
            font-size: 9px;
        }
        .large {
            font-size: 16px;
        }
        .dashed-line {
            border-top: 1px dashed #999;
            margin: 6px 0;
        }
        .store-name {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
        }
        .store-info {
            font-size: 9px;
            text-align: center;
            margin: 1px 0;
        }
        .invoice-title {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            margin: 4px 0;
        }
        .info-row {
            margin: 2px 0;
            font-size: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            padding: 2px 1px;
            border-bottom: 1px dashed #999;
        }
        th.left {
            text-align: left;
        }
        th.right {
            text-align: right;
        }
        td {
            font-size: 10px;
            padding: 3px 1px;
            vertical-align: top;
        }
        td.name {
            word-wrap: break-word;
            max-width: 120px;
            text-align: left;
        }
        td.qty {
            text-align: center;
            white-space: nowrap;
        }
        td.price {
            text-align: right;
            white-space: nowrap;
        }
        td.total {
            text-align: right;
            white-space: nowrap;
        }
        .summary-row td {
            font-weight: bold;
            padding-top: 4px;
            font-size: 10px;
        }
        .payment-method {
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            margin: 4px 0 2px 0;
        }
        .payment-total {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin: 2px 0 4px 0;
        }
        .thank-you {
            text-align: center;
            font-size: 9px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- Store Header -->
    <div class="store-name">YONEX STORE</div>
    <div class="store-info">268 To Hien Thanh, Hai Ba Trung, Ha Noi</div>
    <div class="store-info">DT: 1900 6750</div>

    <div class="dashed-line"></div>

    <!-- Invoice Title -->
    <div class="invoice-title">HOA DON THANH TOAN</div>

    <!-- Invoice Info -->
    <div class="info-row">
        So HD: <span th:text="${invoiceId}">0001</span>
        &#160;&#160;&#160;&#160;
        Ngay: <span th:text="${date}">01/01/2025</span>
    </div>
    <div class="info-row">
        Gio: <span th:text="${time}">12:00:00</span>
    </div>
    <div class="info-row">
        Khach hang: <span th:text="${customerName}">Khach le</span>
    </div>

    <div class="dashed-line"></div>

    <!-- Items Table -->
    <table>
        <thead>
        <tr>
            <th class="left">TEN HANG</th>
            <th>SL</th>
            <th class="right">DON GIA</th>
            <th class="right">T.TIEN</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td class="name" th:text="${item.name}">San pham</td>
            <td class="qty" th:text="${item.quantity}">1</td>
            <td class="price" th:text="${item.price}">0</td>
            <td class="total" th:text="${item.lineTotal}">0</td>
        </tr>
        </tbody>
    </table>

    <div class="dashed-line"></div>

    <!-- Summary -->
    <table>
        <tbody>
        <tr class="summary-row">
            <td style="text-align:left;">T.Cong: <span th:text="${totalQuantity}">0</span> SP</td>
            <td style="text-align:right;" th:text="${total}">0</td>
        </tr>
        </tbody>
    </table>

    <div class="dashed-line"></div>

    <!-- Payment -->
    <div class="payment-method" th:text="${paymentMethod}">TIEN MAT</div>
    <div class="payment-total" th:text="${total}">0</div>

    <div class="dashed-line"></div>

    <!-- Footer -->
    <div class="thank-you">Cam On Quy Khach - Hen Gap Lai</div>
</div>
</body>
</html>
