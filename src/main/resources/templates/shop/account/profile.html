<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <section class="shop-section shop-account-section">
        <div class="shop-container">
            <div class="shop-account">
                <aside class="shop-account-sidebar shop-card">
                    <div class="shop-account-sidebar__customer">
                        <span class="shop-account-sidebar__avatar" aria-hidden="true">
                            <i class="bi bi-person-circle"></i>
                        </span>
                        <div>
                            <h2 class="shop-account-sidebar__name" th:text="${customerName}">Khách hàng</h2>
                            <p class="shop-account-sidebar__email" th:text="${customerEmail}">email@example.com</p>
                        </div>
                    </div>

                    <nav class="shop-account-nav" aria-label="Điều hướng tài khoản">
                        <a class="shop-account-nav__item"
                           th:href="@{/tai-khoan}"
                           th:classappend="${activeTab == 'dashboard'} ? ' shop-account-nav__item--active'">
                            <i class="bi bi-grid-1x2"></i>
                            <span>Tổng quan</span>
                        </a>
                        <a class="shop-account-nav__item"
                           th:href="@{/tai-khoan/don-hang}"
                           th:classappend="${activeTab == 'orders'} ? ' shop-account-nav__item--active'">
                            <i class="bi bi-box-seam"></i>
                            <span>Đơn hàng</span>
                        </a>
                        <a class="shop-account-nav__item"
                           th:href="@{/tai-khoan/ho-so}"
                           th:classappend="${activeTab == 'profile'} ? ' shop-account-nav__item--active'">
                            <i class="bi bi-person-vcard"></i>
                            <span>Hồ sơ</span>
                        </a>
                        <a class="shop-account-nav__item shop-account-nav__item--logout" th:href="@{/dang-xuat}">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>Đăng xuất</span>
                        </a>
                    </nav>
                </aside>

                <div class="shop-account-content">
                    <section class="shop-account-panel shop-card">
                        <div class="shop-account-panel__header">
                            <div>
                                <p class="shop-account__eyebrow">Thông tin cá nhân</p>
                                <h1 class="shop-h3">Hồ sơ cá nhân</h1>
                                <p>Cập nhật tên, số điện thoại và địa chỉ để quá trình giao hàng diễn ra nhanh hơn.</p>
                            </div>
                        </div>

                        <div class="shop-account-alerts" th:if="${success != null or error != null}">
                            <div class="shop-account-alert shop-account-alert--success" th:if="${success != null}">
                                <i class="bi bi-check-circle-fill"></i>
                                <span th:text="${success}">Cập nhật hồ sơ thành công!</span>
                            </div>
                            <div class="shop-account-alert shop-account-alert--error" th:if="${error != null}">
                                <i class="bi bi-exclamation-octagon-fill"></i>
                                <span th:text="${error}">Có lỗi xảy ra.</span>
                            </div>
                        </div>

                        <form class="shop-account-form" th:action="@{/tai-khoan/ho-so}" method="post">
                            <div class="shop-field">
                                <label class="shop-label" for="shopProfileEmail">Email</label>
                                <input id="shopProfileEmail"
                                       class="shop-input"
                                       type="email"
                                       th:value="${customer != null ? customer.email : customerEmail}"
                                       readonly />
                            </div>

                            <div class="shop-field">
                                <label class="shop-label" for="shopProfileName">Họ tên</label>
                                <input id="shopProfileName"
                                       class="shop-input"
                                       type="text"
                                       name="tenKhachHang"
                                       th:value="${customer != null ? customer.tenKhachHang : customerName}"
                                       required />
                            </div>

                            <div class="shop-field">
                                <label class="shop-label" for="shopProfilePhone">Số điện thoại</label>
                                <input id="shopProfilePhone"
                                       class="shop-input"
                                       type="tel"
                                       name="sdt"
                                       th:value="${customer != null ? customer.sdt : ''}"
                                       required />
                            </div>

                            <div class="shop-field">
                                <label class="shop-label" for="shopProfileAddress">Địa chỉ</label>
                                <textarea id="shopProfileAddress"
                                          class="shop-input shop-account-form__textarea"
                                          name="diaChiKhachHang"
                                          required
                                          th:text="${customer != null ? customer.diaChiKhachHang : ''}"></textarea>
                            </div>

                            <div class="shop-account-form__actions">
                                <button type="submit" class="shop-btn shop-btn--primary shop-btn--lg">
                                    Lưu thay đổi
                                </button>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </section>
</div>
